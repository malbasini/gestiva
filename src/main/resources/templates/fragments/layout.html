<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="appHeader" class="app-header">
    <div class="app-header-inner">
        <a th:href="@{/dashboard(tenantId=${tenantId})}" class="brand">
            <span>Gestiva</span>
        </a>

        <nav class="top-nav">
            <a th:href="@{/dashboard(tenantId=${tenantId})}"
               th:classappend="${activeMenu == 'dashboard'} ? ' active' : ''">
                <span class="nav-icon">⌂</span>
                <span>Dashboard</span>
            </a>

            <a th:href="@{/customers(tenantId=${tenantId})}"
               th:classappend="${activeMenu == 'customers'} ? ' active' : ''">
                <span class="nav-icon">👥</span>
                <span>Clienti</span>
            </a>

            <a th:href="@{/quotes(tenantId=${tenantId})}"
               th:classappend="${activeMenu == 'quotes'} ? ' active' : ''">
                <span class="nav-icon">🧾</span>
                <span>Preventivi</span>
            </a>

            <a th:href="@{/orders(tenantId=${tenantId})}"
               th:classappend="${activeMenu == 'orders'} ? ' active' : ''">
                <span class="nav-icon">📦</span>
                <span>Ordini</span>
            </a>
        </nav>
    </div>
</header>

<footer th:fragment="appFooter" class="app-footer">
    <div class="app-footer-inner">
        Gestiva — gestionale modulare in sviluppo
    </div>
</footer>

<div th:fragment="flashMessages">
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}">Operazione completata con successo.</span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error">
        <span th:text="${errorMessage}">Si è verificato un errore.</span>
    </div>
</div>

</body>
</html>
