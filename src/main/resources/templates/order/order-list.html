<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Ordini</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/layout :: appHeader}"></div>

  <main class="app-main">
    <div class="page">
      <div class="card">

        <div class="breadcrumb">
          <a th:href="@{/dashboard(tenantId=${tenantId})}">Dashboard</a> /
          <span>Ordini</span>
        </div>

        <div class="page-header">
          <div class="page-header-left">
            <h1 class="page-title">Ordini</h1>
            <div class="muted">Gestione ordini cliente</div>
          </div>
        </div>

        <form method="get" th:action="@{/orders}" class="filters">
          <input type="hidden" name="tenantId" th:value="${tenantId}"/>

          <input type="text" name="search" placeholder="Cerca numero ordine" th:value="${search}"/>

          <select name="status">
            <option value="">Tutti gli stati</option>
            <option value="CONFIRMED" th:selected="${status == 'CONFIRMED'}">CONFIRMED</option>
            <option value="DRAFT" th:selected="${status == 'DRAFT'}">DRAFT</option>
            <option value="FULFILLED" th:selected="${status == 'FULFILLED'}">FULFILLED</option>
            <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
          </select>

          <input type="number" name="customerId" placeholder="Customer ID" th:value="${customerId}"/>
          <input type="number" name="quoteId" placeholder="Quote ID" th:value="${quoteId}"/>

          <button type="submit" class="btn">Filtra</button>

          <a class="btn btn-secondary"
             th:href="@{/orders(tenantId=${tenantId})}">
            Reset
          </a>
        </form>

        <table class="table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Numero</th>
            <th>Data</th>
            <th>Stato</th>
            <th>Quote ID</th>
            <th class="text-right">Totale</th>
            <th>Azioni</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(ordersPage.content)}">
            <td colspan="7" class="muted">Nessun ordine trovato.</td>
          </tr>
          <tr th:each="order : ${ordersPage.content}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.orderNumber}">ORD-2026-00001</td>
            <td th:text="${order.formattedOrderDate}">28/04/2026</td>
            <td>
                            <span class="badge"
                                  th:classappend="${order.status == 'CONFIRMED'} ? ' badge-confirmed' :
                                                  (${order.status == 'FULFILLED'} ? ' badge-fulfilled' :
                                                  (${order.status == 'CANCELLED'} ? ' badge-cancelled' : ' badge-draft'))"
                                  th:text="${order.status}">
                                CONFIRMED
                            </span>
            </td>
            <td th:text="${order.quoteId}">58</td>
            <td class="text-right" th:text="${order.formattedTotalAmount}">1.342,00 €</td>
            <td class="link-actions">
              <a th:href="@{/orders/{id}(id=${order.id}, tenantId=${tenantId})}">
                <i class="bi bi-file-earmark-text"></i>
                <span>Dettaglio</span>
              </a>
              <a th:href="@{/orders/{id}/preview(id=${order.id}, tenantId=${tenantId})}">
                <i class="bi bi-eye"></i>
                <span>Preview</span>
              </a>
              <a th:href="@{/api/orders/{id}/pdf(id=${order.id}, tenantId=${tenantId})}">
                <i class="bi bi-file-earmark-pdf"></i>
                <span>PDF</span>
              </a>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="pagination">
          <a th:if="${!ordersPage.first}"
             th:href="@{/orders(page=${ordersPage.page - 1}, size=${ordersPage.size}, search=${search}, status=${status}, customerId=${customerId}, quoteId=${quoteId}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
            ← Precedente
          </a>

          <span>
                        Pagina <strong th:text="${ordersPage.page + 1}">1</strong>
                        di <strong th:text="${ordersPage.totalPages}">1</strong>
                        — Totale elementi: <strong th:text="${ordersPage.totalElements}">0</strong>
                    </span>

          <a th:if="${!ordersPage.last}"
             th:href="@{/orders(page=${ordersPage.page + 1}, size=${ordersPage.size}, search=${search}, status=${status}, customerId=${customerId}, quoteId=${quoteId}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
            Successiva →
          </a>
        </div>

      </div>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: appFooter}"></div>

</div>
</body>
</html>
