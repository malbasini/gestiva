<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Clienti</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/layout :: appHeader}"></div>

  <main class="app-main">
    <div class="page">
      <div class="card">

        <div class="breadcrumb">
          <a th:href="@{/dashboard(tenantId=${tenantId})}">Dashboard</a> /
          <span>Clienti</span>
        </div>

        <div class="page-header">
          <div class="page-header-left">
            <h1 class="page-title">Clienti</h1>
            <div class="muted">Gestione anagrafiche clienti</div>
          </div>

          <div class="page-header-right">
            <a class="btn" th:href="@{/customers/new(tenantId=${tenantId})}">
              <i class="bi bi-plus-lg"></i>
              <span>Nuovo cliente</span>
            </a>
          </div>
        </div>

        <form method="get" th:action="@{/customers}" class="filters">
          <input type="hidden" name="tenantId" th:value="${tenantId}"/>

          <input type="text" name="search" placeholder="Cerca nome, email o P.IVA" th:value="${search}"/>

          <select name="status">
            <option value="">Tutti gli stati</option>
            <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
            <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">INACTIVE</option>
          </select>

          <select name="type">
            <option value="">Tutti i tipi</option>
            <option value="COMPANY" th:selected="${type == 'COMPANY'}">COMPANY</option>
            <option value="PERSON" th:selected="${type == 'PERSON'}">PERSON</option>
          </select>

          <button type="submit" class="btn">Filtra</button>

          <a class="btn btn-secondary"
             th:href="@{/customers(tenantId=${tenantId})}">
            Reset
          </a>
        </form>

        <table class="table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>P.IVA</th>
            <th>Tipo</th>
            <th>Stato</th>
            <th>Azioni</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(customersPage.content)}">
            <td colspan="7" class="muted">Nessun cliente trovato.</td>
          </tr>
          <tr th:each="customer : ${customersPage.content}">
            <td th:text="${customer.id}">1</td>
            <td th:text="${customer.name}">Rossi Srl</td>
            <td th:text="${customer.email}">rossi@example.com</td>
            <td th:text="${customer.vatNumber}">IT12345678901</td>
            <td th:text="${customer.type}">COMPANY</td>
            <td>
                            <span class="badge"
                                  th:classappend="${customer.status == 'ACTIVE'} ? ' badge-active' : ' badge-inactive'"
                                  th:text="${customer.status}">
                                ACTIVE
                            </span>
            </td>
            <td class="link-actions">
              <a th:href="@{/customers/{id}(id=${customer.id}, tenantId=${tenantId})}">
                <i class="bi bi-person-vcard"></i>
                <span>Dettaglio</span>
              </a>
              <a th:href="@{/quotes(customerId=${customer.id}, tenantId=${tenantId})}">
                <i class="bi bi-receipt"></i>
                <span>Preventivi</span>
              </a>
              <a th:href="@{/orders(customerId=${customer.id}, tenantId=${tenantId})}">
                <i class="bi bi-box-seam"></i>
                <span>Ordini</span>
              </a>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="pagination">
          <a th:if="${!customersPage.first}"
             th:href="@{/customers(page=${customersPage.page - 1}, size=${customersPage.size}, search=${search}, status=${status}, type=${type}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
            ← Precedente
          </a>

          <span>
                        Pagina <strong th:text="${customersPage.page + 1}">1</strong>
                        di <strong th:text="${customersPage.totalPages}">1</strong>
                        — Totale elementi: <strong th:text="${customersPage.totalElements}">0</strong>
                    </span>

          <a th:if="${!customersPage.last}"
             th:href="@{/customers(page=${customersPage.page + 1}, size=${customersPage.size}, search=${search}, status=${status}, type=${type}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
            Successiva →
          </a>
        </div>

      </div>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: appFooter}"></div>

</div>
</body>
</html>
