<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="'Cliente ' + ${customer.name}">Dettaglio cliente</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/layout :: appHeader}"></div>

  <main class="app-main">
    <div class="page">
      <div class="card">

        <div th:replace="~{fragments/layout :: flashMessages}"></div>

        <div class="breadcrumb">
          <a th:href="@{/dashboard(tenantId=${tenantId})}">Dashboard</a> /
          <a th:href="@{/customers(tenantId=${tenantId})}">Clienti</a> /
          <span th:text="${customer.name}">Rossi Srl</span>
        </div>

        <div class="page-header">
          <div class="page-header-left">
            <h1 class="page-title" th:text="${customer.name}">Rossi Srl</h1>
            <div class="muted">Dettaglio cliente</div>
          </div>

          <div class="page-header-right">
            <a class="btn btn-secondary" th:href="@{/customers(tenantId=${tenantId})}">
              <i class="bi bi-arrow-left"></i>
              <span>Torna alla lista</span>
            </a>
            <a class="btn" th:href="@{/customers/{id}/edit(id=${customer.id}, tenantId=${tenantId})}">
              <i class="bi bi-pencil"></i>
              <span>Modifica</span>
            </a>
            <a class="btn" th:href="@{/quotes(customerId=${customer.id}, tenantId=${tenantId})}">
              <i class="bi bi-receipt"></i>
              <span>Preventivi</span>
            </a>
            <a class="btn" th:href="@{/orders(customerId=${customer.id}, tenantId=${tenantId})}">
              <i class="bi bi-box-seam"></i>
              <span>Ordini</span>
            </a>
          </div>
        </div>

        <div class="info-grid three-cols">
          <div class="info-box">
            <div class="label">Email</div>
            <div class="value" th:text="${customer.email}">rossi@example.com</div>
          </div>
          <div class="info-box">
            <div class="label">Telefono</div>
            <div class="value" th:text="${customer.phone}">+39 123456789</div>
          </div>
          <div class="info-box">
            <div class="label">Partita IVA</div>
            <div class="value" th:text="${customer.vatNumber}">IT12345678901</div>
          </div>
          <div class="info-box">
            <div class="label">Tipo</div>
            <div class="value" th:text="${customer.type}">COMPANY</div>
          </div>
          <div class="info-box">
            <div class="label">Stato</div>
            <div class="value">
                            <span class="badge"
                                  th:classappend="${customer.status == 'ACTIVE'} ? ' badge-active' : ' badge-inactive'"
                                  th:text="${customer.status}">
                                ACTIVE
                            </span>
            </div>
          </div>
          <div class="info-box">
            <div class="label">Paese</div>
            <div class="value" th:text="${customer.countryCode}">IT</div>
          </div>
          <div class="info-box">
            <div class="label">Indirizzo</div>
            <div class="value" th:text="${customer.addressLine1}">Via Roma 1</div>
          </div>
          <div class="info-box">
            <div class="label">Città</div>
            <div class="value" th:text="${customer.city}">Roma</div>
          </div>
          <div class="info-box">
            <div class="label">CAP</div>
            <div class="value" th:text="${customer.postalCode}">00100</div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div th:replace="~{fragments/layout :: appFooter}"></div>

</div>
</body>
</html>
