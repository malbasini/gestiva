<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Preventivi</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/layout :: appHeader}"></div>

    <main class="app-main">
        <div class="page">
            <div class="card">

                <div class="breadcrumb">
                    <a th:href="@{/dashboard(tenantId=${tenantId})}">Dashboard</a> /
                    <span>Preventivi</span>
                </div>

                <div class="page-header">
                    <div class="page-header-left">
                        <h1 class="page-title">Preventivi</h1>
                        <div class="muted">Gestione documenti preventivi</div>
                    </div>

                    <div class="page-header-right">
                        <a class="btn" th:href="@{/quotes/new(tenantId=${tenantId})}">
                            <span class="btn-icon">＋</span>
                            <span>Nuovo preventivo</span>
                        </a>
                    </div>
                </div>

                <form method="get" th:action="@{/quotes}" class="filters">
                    <input type="hidden" name="tenantId" th:value="${tenantId}"/>

                    <input type="text" name="search" placeholder="Cerca numero o note" th:value="${search}"/>

                    <select name="status">
                        <option value="">Tutti gli stati</option>
                        <option value="DRAFT" th:selected="${status == 'DRAFT'}">DRAFT</option>
                        <option value="SENT" th:selected="${status == 'SENT'}">SENT</option>
                        <option value="ACCEPTED" th:selected="${status == 'ACCEPTED'}">ACCEPTED</option>
                        <option value="REJECTED" th:selected="${status == 'REJECTED'}">REJECTED</option>
                    </select>

                    <input type="number" name="customerId" placeholder="Customer ID" th:value="${customerId}"/>

                    <button type="submit" class="btn">Filtra</button>

                    <a class="btn btn-secondary"
                       th:href="@{/quotes(tenantId=${tenantId})}">
                        Reset
                    </a>
                </form>

                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Numero</th>
                        <th>Data</th>
                        <th>Validità</th>
                        <th>Stato</th>
                        <th class="text-right">Totale</th>
                        <th>Azioni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(quotesPage.content)}">
                        <td colspan="7" class="muted">Nessun preventivo trovato.</td>
                    </tr>
                    <tr th:each="quote : ${quotesPage.content}">
                        <td th:text="${quote.id}">1</td>
                        <td th:text="${quote.quoteNumber}">PRE-2026-00001</td>
                        <td th:text="${quote.formattedQuoteDate}">28/04/2026</td>
                        <td th:text="${quote.formattedValidUntil}">28/05/2026</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${quote.status == 'DRAFT'} ? ' badge-draft' :
                                                  (${quote.status == 'SENT'} ? ' badge-sent' :
                                                  (${quote.status == 'ACCEPTED'} ? ' badge-accepted' : ' badge-rejected'))"
                                  th:text="${quote.status}">
                                SENT
                            </span>
                        </td>
                        <td class="text-right" th:text="${quote.formattedTotalAmount}">1.342,00 €</td>
                        <td class="link-actions">
                            <a th:href="@{/quotes/{id}(id=${quote.id}, tenantId=${tenantId})}">Dettaglio</a>
                            <a th:href="@{/quotes/{id}/preview(id=${quote.id}, tenantId=${tenantId})}">Preview</a>
                            <a th:href="@{/api/quotes/{id}/pdf(id=${quote.id}, tenantId=${tenantId})}">PDF</a>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div class="pagination">
                    <a th:if="${!quotesPage.first}"
                       th:href="@{/quotes(page=${quotesPage.page - 1}, size=${quotesPage.size}, search=${search}, status=${status}, customerId=${customerId}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
                        ← Precedente
                    </a>

                    <span>
                        Pagina <strong th:text="${quotesPage.page + 1}">1</strong>
                        di <strong th:text="${quotesPage.totalPages}">1</strong>
                        — Totale elementi: <strong th:text="${quotesPage.totalElements}">0</strong>
                    </span>

                    <a th:if="${!quotesPage.last}"
                       th:href="@{/quotes(page=${quotesPage.page + 1}, size=${quotesPage.size}, search=${search}, status=${status}, customerId=${customerId}, sortBy=${sortBy}, sortDir=${sortDir}, tenantId=${tenantId})}">
                        Successiva →
                    </a>
                </div>

            </div>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: appFooter}"></div>

</div>
</body>
</html>
